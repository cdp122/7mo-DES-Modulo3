type DatosDocente {
  cedula: String!
  nombre: String!
}

type Respuesta {
  reactivo_codigo: String!
  valor: Int!
}

type Subtotales {
  D1: Float!
  D2: Float!
  D3: Float!
}

type IndicesDimensionales {
  ID1: Float!
  ID2: Float!
  ID3: Float!
}

type ResultadosEvaluacion {
  subtotales: Subtotales!
  indices_dimensionales: IndicesDimensionales!
  IGPP: Float!
  dimension_prioritaria: String!
}

type Evaluacion {
  id: ID!
  datos_docente: DatosDocente!
  respuestas: [Respuesta!]!
  resultados: ResultadosEvaluacion!
}

type PromediosGlobales {
  D1: Float!
  D2: Float!
  D3: Float!
  IGPP: Float!
}

# ── Tipos para métricas interpretadas ────────────────────────────

type InterpretacionDimension {
  nombre: String!
  clave: String!
  puntaje: Float!
  maximo: Float!
  porcentaje: Float!
  nivel: String!
}

type ResultadosInterpretados {
  evaluacion_id: ID!
  docente_cedula: String!
  docente_nombre: String!
  dimensiones: [InterpretacionDimension!]!
  puntaje_total: Float!
  maximo_total: Float!
  IGPP: Float!
  nivel_general: String!
  dimension_prioritaria: String!
}

type ResumenGeneral {
  total_evaluaciones: Int!
  promedio_D1: Float!
  promedio_D2: Float!
  promedio_D3: Float!
  promedio_IGPP: Float!
  nivel_general: String!
  dimensiones: [InterpretacionDimension!]!
}

# ── Inputs ───────────────────────────────────────────────────────

input DatosDocenteInput {
  cedula: String!
  nombre: String!
}

input RespuestaInput {
  reactivo_codigo: String!
  valor: Int!
}

input CrearEvaluacionInput {
  datos_docente: DatosDocenteInput!
  respuestas: [RespuestaInput!]!
}

# ── Queries y Mutations ─────────────────────────────────────────

type Query {
  obtenerEvaluaciones: [Evaluacion!]!
  obtenerEvaluacion(id: ID!): Evaluacion
  obtenerEvaluacionesPorDocente(cedula: String!): [Evaluacion!]!
  obtenerPromediosGlobales: PromediosGlobales!
  obtenerResultadosEvaluacion(id: ID!): ResultadosInterpretados
  obtenerResultadosPorDocente(cedula: String!): [ResultadosInterpretados!]!
  obtenerResumenGeneral: ResumenGeneral!
}

type Mutation {
  crearEvaluacion(input: CrearEvaluacionInput!): Evaluacion!
}
