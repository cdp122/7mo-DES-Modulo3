scalar CedulaEcuatoriana

type Respuesta {
  reactivo_codigo: String!
  valor: Int!
}

type Comentarios {
  compromiso_personal: String
  opiniones_programa: String
}

type Subtotales {
  D1: Float!
  D2: Float!
  D3: Float!
}

type IndicesDimensionales {
  ID1: Float!
  ID2: Float!
  ID3: Float!
}

type ResultadosEvaluacion {
  subtotales: Subtotales!
  indices_dimensionales: IndicesDimensionales!
  IGPP: Float!
  dimension_prioritaria: String!
}

type Evaluacion {
  id: ID!
  cedula_docente: CedulaEcuatoriana!
  respuestas: [Respuesta!]!
  comentarios: Comentarios
  resultados: ResultadosEvaluacion!
}

type PromediosGlobales {
  D1: Float!
  D2: Float!
  D3: Float!
  IGPP: Float!
}

# ── Tipos para métricas interpretadas ────────────────────────────

type InterpretacionDimension {
  nombre: String!
  clave: String!
  puntaje: Float!
  maximo: Float!
  porcentaje: Float!
  nivel: String!
}

type ResultadosInterpretados {
  evaluacion_id: ID!
  docente_cedula: CedulaEcuatoriana!
  dimensiones: [InterpretacionDimension!]!
  puntaje_total: Float!
  maximo_total: Float!
  IGPP: Float!
  nivel_general: String!
  dimension_prioritaria: String!
}

type ResumenGeneral {
  total_evaluaciones: Int!
  promedio_D1: Float!
  promedio_D2: Float!
  promedio_D3: Float!
  promedio_IGPP: Float!
  nivel_general: String!
  dimensiones: [InterpretacionDimension!]!
}

# ── Inputs ───────────────────────────────────────────────────────

input RespuestaInput {
  reactivo_codigo: String!
  valor: Int!
}

input ComentariosInput {
  compromiso_personal: String
  opiniones_programa: String
}

input CrearEvaluacionInput {
  cedula_docente: CedulaEcuatoriana!
  respuestas: [RespuestaInput!]!
}

# ── Queries y Mutations ─────────────────────────────────────────

type Query {
  obtenerEvaluaciones: [Evaluacion!]!
  obtenerEvaluacion(id: ID!): Evaluacion
  obtenerEvaluacionesPorDocente(cedula: CedulaEcuatoriana!): [Evaluacion!]!
  obtenerPromediosGlobales: PromediosGlobales!
  obtenerResultadosEvaluacion(id: ID!): ResultadosInterpretados
  obtenerResultadosPorDocente(cedula: CedulaEcuatoriana!): [ResultadosInterpretados!]!
  obtenerResumenGeneral: ResumenGeneral!
}

type Mutation {
  crearEvaluacion(input: CrearEvaluacionInput!): Evaluacion!
  agregarComentarios(evaluacionId: ID!, input: ComentariosInput!): Evaluacion!
}
