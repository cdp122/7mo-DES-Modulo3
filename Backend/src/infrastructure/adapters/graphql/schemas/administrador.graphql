type Administrador {
  id: ID!
  cedula: String!
  nombre: String!
  email: String!
  rol: String!
}

type AuthPayload {
  token: String!
  administrador: Administrador!
}

input LoginInput {
  email: String!
  password: String!
}

input CrearAdministradorInput {
  cedula: String!
  nombre: String!
  email: String!
  password: String!
}

input ActualizarAdministradorInput {
  nombre: String
  email: String
  password: String
}

type Query {
  obtenerAdministradores: [Administrador!]!
  obtenerAdministrador(id: ID!): Administrador
  administradorActual: Administrador
  buscarAdminPorCedula(cedula: String!): Administrador
}

type Mutation {
  login(input: LoginInput!): AuthPayload!
  crearAdministrador(input: CrearAdministradorInput!): Administrador!
  actualizarAdministrador(id: ID!, input: ActualizarAdministradorInput!): Administrador!
  cambiarRolAdministrador(id: ID!, nuevoRol: String!): Administrador!
}