services:
  mongodb:
    image: mongo:7.0
    container_name: mongo-local-tx
    # Iniciamos mongo con el replica set 'rs0' y enlazamos la IP local
    command: ["--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    # Este contenedor auxiliar se ejecuta SOLO para iniciar el replica set si no está listo
    healthcheck:
      test: |
        mongosh --eval "try { rs.status().ok } catch (e) { rs.initiate({_id:'rs0',members:[{_id:0,host:'localhost:27017'}]}); }"
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  mongo_data: